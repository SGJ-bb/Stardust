
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live2D Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        #live2d-container {
            width: 300px;
            height: 500px;
            border: 1px solid #ccc;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Live2D Model Test</h1>
    <p>Model server: http://localhost:8000</p>
    <p>Model path: http://localhost:8000/小恶魔.model3.json</p>
    
    <div id="live2d-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/live2d-widget@3.0.5/lib/L2Dwidget.min.js"></script>
    <script>
        // 模型路径
        const modelPath = 'http://localhost:8000/小恶魔.model3.json';
        
        console.log('Loading model from:', modelPath);
        
        // 初始化Live2D模型
        try {
            L2Dwidget.init({
                model: {
                    jsonPath: modelPath
                },
                display: {
                    superSample: 2,
                    width: 300,
                    height: 500,
                    position: 'center',
                    hOffset: 0,
                    vOffset: 0
                },
                mobile: {
                    show: true,
                    scale: 0.8
                },
                react: {
                    opacityDefault: 1,
                    opacityOnHover: 1
                },
                dev: {
                    border: false
                },
                callback: {
                    onModelLoaded: function() {
                        console.log('Live2D模型加载成功');
                        document.querySelector('h1').style.color = 'green';
                        document.querySelector('h1').textContent = 'Live2D Model Test - SUCCESS!';
                    },
                    onError: function(err) {
                        console.error('Live2D模型加载失败:', err);
                        document.querySelector('h1').style.color = 'red';
                        document.querySelector('h1').textContent = 'Live2D Model Test - FAILED!';
                    }
                }
            });
        } catch (error) {
            console.error('Live2D初始化失败:', error);
            document.querySelector('h1').style.color = 'red';
            document.querySelector('h1').textContent = 'Live2D Model Test - ERROR!';
        }
    </script>
</body>
</html>
